const GH_REPO = 'eladadler/portfolio';
const GH_FILE = 'portfolio-content.json';

const CONTENT_KEY = 'elad_portfolio_v2';

async function fetchRemoteContent() {
  try {
    const r = await fetch('./' + GH_FILE + '?t=' + Date.now());
    if (!r.ok) return null;
    const j = await r.json();
    return (j && typeof j === 'object' && Object.keys(j).length > 0) ? j : null;
  } catch { return null; }
}

async function pushToGitHub(full, token) {
  const api = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
  let sha = '';
  try { const r = await fetch(api,{headers:{Authorization:'token '+token}}); if(r.ok){const d=await r.json();sha=d.sha||'';} } catch {}
  const bytes = new TextEncoder().encode(JSON.stringify(full,null,2));
  const b64 = btoa(Array.from(bytes,b=>String.fromCharCode(b)).join(''));
  const res = await fetch(api,{method:'PUT',headers:{Authorization:'token '+token,'Content-Type':'application/json'},body:JSON.stringify({message:'Update portfolio content',content:b64,...(sha?{sha}:{})})});
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||'GitHub API error '+res.status); }
}

// ─── Image compression ────────────────────────────────────────────
function compressImage(file, maxPx=1600, q=0.82) {
  return new Promise((resolve,reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let {naturalWidth:w,naturalHeight:h} = img;
      if (w>maxPx||h>maxPx){const r=maxPx/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',q));
    };
    img.onerror=reject; img.src=url;
  });
}

// ─── Edit context ─────────────────────────────────────────────────
const EditCtx = React.createContext({em:false,d:{},up:()=>{},flash:()=>{}});

function setIn(obj, path, val) {
  if (!path||!path.length) return val;
  const [h,...rest] = path;
  if (Array.isArray(obj)){const a=[...obj];a[h]=setIn(a[h],rest,val);return a;}
  return {...obj,[h]:setIn(obj?obj[h]:undefined,rest,val)};
}

function E({v='',tag:T='span',multi=false,cn='',st,path}) {
  const {em,up,flash} = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const committed = React.useRef(v);
  React.useLayoutEffect(() => {
    const el=ref.current; if(!el||!em) return;
    if(committed.current!==v){committed.current=v;if(multi)el.innerText=v;else el.textContent=v;}
  },[v,em,multi]);
  if (!em) return <T className={cn} style={st}>{v}</T>;
  const save = e => {
    const nv=(multi?e.currentTarget.innerText:e.currentTarget.textContent).trim();
    if(nv!==committed.current){committed.current=nv;if(path)up(path,nv);flash();}
  };
  return <T ref={ref} className={cn?cn+' ed-f':'ed-f'} style={st} contentEditable suppressContentEditableWarning onBlur={save}
    onKeyDown={multi?undefined:e=>{if(e.key==='Enter'){e.preventDefault();e.currentTarget.blur();}}}>{v}</T>;
}

function ImgSlot({src,alt,path,ratio='16/9',radius=4,placeholder}) {
  const {em,up,flash} = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const [busy,setBusy] = React.useState(false);
  const pick = async e => {
    const f=e.target.files[0]; if(!f) return; e.target.value=''; setBusy(true);
    try{const d=await compressImage(f);up(path,d);flash();}
    catch{const r=new FileReader();r.onload=ev=>{up(path,ev.target.result);flash();};r.readAsDataURL(f);}
    finally{setBusy(false);}
  };
  return (
    <div style={{position:'relative',aspectRatio:ratio,background:'#1E2026',borderRadius:radius,overflow:'hidden',width:'100%'}}>
      {src
        ? <img src={src} alt={alt||''} style={{width:'100%',height:'100%',objectFit:'cover',display:'block',borderRadius:radius}}/>
        : <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'rgba(232,232,228,.25)',fontFamily:"'IBM Plex Mono',monospace",fontSize:12,letterSpacing:'.06em',padding:20,textAlign:'center'}}>
            [ {placeholder||alt||'drop image'} ]
          </div>
      }
      {em && (
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.48)',opacity:0,transition:'opacity .2s',cursor:'pointer'}}
          className="img-replace-ov" onClick={()=>ref.current.click()}>
          <span style={{color:'#fff',fontSize:13,fontWeight:600,background:'rgba(0,0,0,.55)',padding:'10px 22px',borderRadius:8,fontFamily:"'IBM Plex Mono',monospace"}}>
            {busy?'⏳ Processing…':'↑ Replace image'}
          </span>
        </div>
      )}
      <input ref={ref} type="file" accept="image/png,image/jpeg,image/webp,image/avif" hidden onChange={pick}/>
    </div>
  );
}

// ─── Main app ─────────────────────────────────────────────────────
function CS01App() {
  const [allContent, setAllContent] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem(CONTENT_KEY));
      if (s && s[CS_KEY]) return s;
    } catch {}
    return null;
  });
  const d = React.useMemo(() => {
    const saved = allContent && allContent[CS_KEY];
    if (!saved) return DEFAULT;
    const merged = {...DEFAULT};
    for (const k of Object.keys(DEFAULT)) { if (k in saved) merged[k] = saved[k]; }
    return merged;
  }, [allContent]);

  const [em, setEm] = React.useState(false);
  const [showSaved, setShowSaved] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState('');
  const savedTimer = React.useRef(null);
  const syncTimer = React.useRef(null);

  React.useEffect(() => {
    fetchRemoteContent().then(remote => {
      if (!remote) return;
      setAllContent(prev => {
        const merged = {...(prev||{}),...remote};
        try{localStorage.setItem(CONTENT_KEY,JSON.stringify(merged));}catch{}
        return merged;
      });
    });
  }, []);

  const flash = React.useCallback(() => {
    setShowSaved(true);
    clearTimeout(savedTimer.current);
    savedTimer.current = setTimeout(() => setShowSaved(false), 1800);
  }, []);

  const up = React.useCallback((path, val) => {
    setAllContent(prev => {
      const base = prev || {};
      const current = base[CS_KEY] || {};
      const next = setIn(current, path, val);
      const updated = {...base, [CS_KEY]: next};
      try{localStorage.setItem(CONTENT_KEY,JSON.stringify(updated));}catch{}
      return updated;
    });
  }, []);

  const handlePush = React.useCallback(async () => {
    let token = localStorage.getItem(GH_TOKEN_KEY) || '';
    if (!token) {
      token = window.prompt('Enter your GitHub personal access token:');
      if (!token) return;
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
      token = token.trim();
    }
    setSyncing(true); setSyncMsg('');
    try {
      await pushToGitHub(allContent || {}, token);
      setSyncMsg('✓ Saved to GitHub — live in ~60s');
    } catch(e) {
      setSyncMsg('✗ ' + e.message);
    } finally {
      setSyncing(false);
      clearTimeout(syncTimer.current);
      syncTimer.current = setTimeout(()=>setSyncMsg(''),5000);
    }
  }, [allContent]);

  const ctx = React.useMemo(() => ({em,d,up,flash}), [em,d,up,flash]);

  return (
    <EditCtx.Provider value={ctx}>
    <div className="cs">
      <style>{CSS}</style>
      {em && <div className="ed-bar"/>}
      <div className="save-toast" style={{opacity:showSaved?1:0,transform:`translateX(-50%) translateY(${showSaved?0:'-8px'})`}}>
        ✓ saved locally — click ☁ Save to publish
      </div>

      {/* ── Top bar ── */}
      <header className="cs-top">
        <a href="./index.html" className="cs-back mono">← Elad Adler</a>
        <span className="cs-breadcrumb mono">case study · 01</span>
        <div className="cs-top-actions">
          {syncMsg && <span className="cs-sync-msg mono">{syncMsg}</span>}
          <button className="cs-btn mono" disabled={syncing} onClick={handlePush}>{syncing?'↑ Saving…':'☁ Save'}</button>
          <button className={"cs-btn mono"+(em?" cs-btn-on":"")} onClick={()=>setEm(v=>!v)}>{em?'✓ Done':'✎ Edit'}</button>
        </div>
      </header>

      {/* ── Hero ── */}

      {/* ── Challenge ── */}

      {/* ── My Role ── */}

      {/* ── Personas ── */}
      <PersonasSection d={d}/>

      {/* ── Design Principles ── */}

      {/* ── Problem Solving 1 ── */}

      {/* ── The Pivot ── */}

      {/* ── Impact ── */}
      <ImpactSection d={d}/>

      {/* ── Footer nav ── */}
      <footer className="cs-foot mono">
        <a href="./index.html#work" className="cs-foot-link">← All projects</a>
        <a href="./case-study.html?id=02" className="cs-foot-link">ShiftWise →</a>
      </footer>
    </div>
    </EditCtx.Provider>
  );
}

              {d.personaCandNeeds.map((n,i)=>(
                <li key={i}><E v={n} multi path={['personaCandNeeds',i]}/></li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
}

function PrinciplesSection({d}) {
  return (
    <section className="cs-section cs-principles-section">
      <div className="cs-section-label mono">DESIGN PRINCIPLES</div>
      <h2 className="cs-h2">Designing for Tradition</h2>
      <E v={d.principlesIntro} tag="p" multi path={['principlesIntro']} cn="cs-body" st={{marginTop:16,maxWidth:'58ch'}}/>
      <E v={d.principlesAvoid} tag="p" multi path={['principlesAvoid']} cn="cs-body cs-body-em" st={{marginTop:16,maxWidth:'52ch'}}/>
      <div className="cs-principles-grid">
        {d.principles.map((p,i)=>(
          <div key={i} className="cs-principle-card">
            <ImgSlot src={p.image} path={['principles',i,'image']} ratio="4/3" placeholder={"principle "+(i+1)+" screenshot"}/>
            <div style={{padding:'24px 20px 20px'}}>
              <E v={p.title} tag="h4" path={['principles',i,'title']} cn="cs-principle-title"/>
              <E v={p.body} tag="p" multi path={['principles',i,'body']} cn="cs-principle-body"/>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

function PS1Section({d}) {
  return (
    <section className="cs-section">
      <div className="cs-section-label mono">PROBLEM SOLVING</div>
      <h2 className="cs-h2"><E v={d.ps1Title} path={['ps1Title']}/></h2>
      <div className="cs-two-col" style={{marginTop:32}}>
        <div className="cs-two-col-text">
          <E v={d.ps1Intro} tag="p" multi path={['ps1Intro']} cn="cs-body" st={{marginBottom:24}}/>
          <div className="cs-ps-block">
            <div className="cs-ps-block-label mono">Exploring Solutions</div>
            <E v={d.ps1Explore} tag="p" multi path={['ps1Explore']} cn="cs-body"/>
          </div>
          <div className="cs-ps-block cs-ps-solution">
            <div className="cs-ps-block-label mono">The Solution</div>
            <E v={d.ps1Solution} tag="p" multi path={['ps1Solution']} cn="cs-body"/>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <ImgSlot src={d.ps1Image1} path={['ps1Image1']} ratio="9/16" placeholder="candidate creation — before screen"/>
          <ImgSlot src={d.ps1Image2} path={['ps1Image2']} ratio="9/16" placeholder="candidate creation — after screen"/>
        </div>
      </div>
    </section>
  );
}

function PivotSection({d}) {
  return (
    <section className="cs-section cs-pivot-section">
      <div className="cs-section-label mono">THE PIVOT</div>
      <h2 className="cs-h2"><E v={d.pivotTitle} path={['pivotTitle']}/></h2>
      <div className="cs-two-col" style={{marginTop:32}}>
        <div className="cs-two-col-text">
          <div className="cs-pivot-block">
            <div className="cs-pivot-label mono">The Challenge</div>
            <E v={d.pivotChallenge} tag="p" multi path={['pivotChallenge']} cn="cs-body"/>
          </div>
          <div className="cs-pivot-block">
            <div className="cs-pivot-label mono">The Insight</div>
            <E v={d.pivotInsight} tag="p" multi path={['pivotInsight']} cn="cs-body"/>
          </div>
          <div className="cs-pivot-block cs-pivot-solution">
            <div className="cs-pivot-label mono">The Pivot</div>
            <E v={d.pivotSolution} tag="p" multi path={['pivotSolution']} cn="cs-body"/>
          </div>
          <div className="cs-pivot-block" style={{marginTop:24}}>
            <div className="cs-pivot-label mono">The Outcome</div>
            <ul className="cs-bullets" style={{marginTop:8}}>
              {d.pivotOutcome.map((item,i)=>(
                <li key={i}><E v={item} multi path={['pivotOutcome',i]}/></li>
              ))}
            </ul>
          </div>
        </div>
        <ImgSlot src={d.pivotImage} path={['pivotImage']} ratio="3/4" placeholder="invite flow — before & after"/>
      </div>

}

function ImpactSection({d}) {
  return (
    <section className="cs-impact">
      <div className="cs-impact-bg">
        <ImgSlot src={d.impactImage} path={['impactImage']} ratio="16/6" radius={0} placeholder="impact — hero closing image"/>
      </div>
      <div className="cs-impact-content">
        <div className="cs-section-label mono" style={{color:'rgba(232,232,228,.5)'}}>IMPACT</div>
        <h2 className="cs-h2" style={{marginTop:12}}>
          <E v={d.impactTitle} path={['impactTitle']}/>
        </h2>
        <E v={d.impactIntro} tag="p" multi path={['impactIntro']} cn="cs-body" st={{marginTop:12,opacity:.75}}/>
        <div className="cs-impact-stats">
          {d.impactStats.map((s,i)=>(
            <div key={i} className="cs-impact-stat">
              <E v={s.value} tag="div" path={['impactStats',i,'value']} cn="cs-impact-val"/>
              <E v={s.label} tag="div" path={['impactStats',i,'label']} cn="cs-impact-label mono"/>
            </div>
          ))}
        </div>
        <E v={d.impactClosing} tag="p" multi path={['impactClosing']} cn="cs-body" st={{marginTop:32,opacity:.65,fontStyle:'italic'}}/>
      </div>

}

// ─── CSS ──────────────────────────────────────────────────────────
const CSS = `
  :root{--bg:#141519;--ink:#E8E8E4;--ink-rgb:232,232,228;--accent:#7184FF;--surface:#1E2026;--border:rgba(232,232,228,.11);}
  .cs{background:var(--bg);color:var(--ink);font-family:'Archivo',sans-serif;min-height:100vh;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .ed-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:9990;pointer-events:none;}
  .ed-f{outline:1.5px dashed rgba(113,132,255,.5);border-radius:3px;cursor:text;min-width:2em;transition:outline-color .15s,background .15s;}
  .ed-f:hover{outline-color:rgba(113,132,255,.85);background:rgba(113,132,255,.06);}
  .ed-f:focus{outline:2px solid var(--accent);background:rgba(113,132,255,.09);outline-offset:1px;}
  .img-replace-ov:hover{opacity:1!important;}
  .save-toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:rgba(30,32,38,.95);color:#e8e8e4;padding:7px 18px;border-radius:999px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;z-index:9998;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .2s,transform .2s;white-space:nowrap;}

  /* Top bar */
  .cs-top{display:flex;align-items:center;justify-content:space-between;padding:18px 80px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(20,21,25,.92);backdrop-filter:blur(12px);z-index:20;gap:20px;}
  .cs-back{color:var(--ink);text-decoration:none;opacity:.55;transition:opacity .2s,color .2s;font-size:12px;letter-spacing:.06em;}
  .cs-back:hover{opacity:1;color:var(--accent);}
  .cs-breadcrumb{opacity:.35;font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
  .cs-top-actions{display:flex;align-items:center;gap:10px;}
  .cs-sync-msg{font-size:11px;color:var(--accent);}
  .cs-btn{appearance:none;border:none;border-radius:8px;padding:7px 14px;font:12px/1.4 'IBM Plex Mono',monospace;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:background .2s,color .2s;background:rgba(232,232,228,.1);color:rgba(232,232,228,.7);}
  .cs-btn:hover{background:rgba(232,232,228,.18);color:var(--ink);}
  .cs-btn.cs-btn-on{background:var(--accent);color:#fff;}

  /* Hero */
  .cs-hero{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;padding:80px 80px 96px;min-height:92vh;border-bottom:1px solid var(--border);}
  .cs-hero-inner{}
  .cs-hero-label{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,232,228,.4);margin-bottom:24px;}
  .cs-num{color:var(--accent);}
  .cs-sep{opacity:.3;}
  .cs-h1{font-size:clamp(32px,4vw,56px);font-weight:600;line-height:1.06;letter-spacing:-.025em;margin-bottom:28px;}
  .cs-h2{font-size:clamp(24px,2.8vw,38px);font-weight:600;line-height:1.1;letter-spacing:-.02em;}
  .cs-intro{font-size:16px;line-height:1.75;color:rgba(232,232,228,.82);}
  .cs-cta-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:.02em;transition:background .2s,transform .15s;}
  .cs-cta-btn:hover{background:#97A4FF;transform:translateX(2px);}
  .cs-cta-href{font-size:10px;opacity:.45;word-break:break-all;}

  /* Sections */
  .cs-section{padding:88px 80px;border-bottom:1px solid var(--border);}
  .cs-section-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
  .cs-body{font-size:16px;line-height:1.78;color:rgba(232,232,228,.82);}
  .cs-body-large{font-size:clamp(18px,1.8vw,22px);line-height:1.68;color:rgba(232,232,228,.88);}
  .cs-body-em{color:rgba(232,232,228,.88);font-weight:500;}
  .cs-bullets{list-style:none;padding:0;display:flex;flex-direction:column;gap:12px;}
  .cs-bullets li{display:flex;gap:12px;align-items:flex-start;font-size:15px;line-height:1.65;color:rgba(232,232,228,.8);}
  .cs-bullets li::before{content:'→';color:var(--accent);flex-shrink:0;margin-top:1px;}

  /* Two column */
  .cs-two-col{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-top:36px;}
  .cs-two-col-rev{grid-template-columns:auto 1fr;}

  /* Ecosystem */
  .cs-eco-block{margin-top:56px;}
  .cs-eco-tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,232,228,.4);margin-bottom:28px;}
  .cs-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;}
  .cs-big-stat{}
  .cs-stat-val{font-size:clamp(44px,5vw,72px);font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--ink);}
  .cs-stat-val-xl{font-size:clamp(56px,6vw,88px);}
  .cs-stat-label{font-size:12px;letter-spacing:.04em;color:rgba(232,232,228,.5);margin-top:10px;line-height:1.55;max-width:22ch;}
  .cs-insights{display:grid;grid-template-columns:1fr auto 1fr;gap:0;margin-top:56px;background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden;}
  .cs-insights-col{padding:40px 44px;}
  .cs-insights-divider{width:1px;background:var(--border);}
  .cs-insight-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:14px;}
  .cs-insight-list li{font-size:15px;line-height:1.6;color:rgba(232,232,228,.8);padding-left:18px;position:relative;}
  .cs-insight-list li::before{content:'·';position:absolute;left:0;color:var(--accent);font-size:20px;line-height:1.2;}

  /* Personas */
  .cs-personas{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:36px;}
  .cs-persona{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:36px;display:flex;flex-direction:column;gap:28px;}
  .cs-persona-circle{border-top:3px solid var(--accent);}
  .cs-persona-square{border-top:3px solid rgba(232,232,228,.3);}
  .cs-persona-img-wrap{width:120px;height:120px;flex-shrink:0;}
  .cs-persona-circle-frame{border-radius:50%;overflow:hidden;}
  .cs-persona-square-frame{border-radius:4px;overflow:hidden;}
  .cs-needs-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,232,228,.35);margin-bottom:12px;}
  .cs-needs-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:10px;}
  .cs-needs-list li{font-size:14px;line-height:1.6;color:rgba(232,232,228,.75);padding-left:16px;position:relative;}
  .cs-needs-list li::before{content:'—';position:absolute;left:0;color:var(--accent);font-size:12px;line-height:1.7;}

  /* Principles */
  .cs-principles-section{background:var(--surface);}
  .cs-principles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
  .cs-principle-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .cs-principle-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:10px;letter-spacing:-.005em;}
  .cs-principle-body{font-size:13.5px;line-height:1.7;color:rgba(232,232,228,.65);}

  /* Problem Solving */
  .cs-ps-block{margin-top:28px;padding:24px;background:var(--surface);border-radius:6px;border-left:3px solid var(--border);}
  .cs-ps-solution{border-left-color:var(--accent);}
  .cs-ps-block-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,232,228,.4);margin-bottom:12px;}

  /* Pivot */
  .cs-pivot-section{background:var(--surface);}
  .cs-pivot-block{margin-top:24px;padding:20px 24px;border-left:2px solid var(--border);}
  .cs-pivot-solution{border-left-color:var(--accent);}
  .cs-pivot-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}

  /* Impact */
  .cs-impact{position:relative;overflow:hidden;}
  .cs-impact-bg{position:absolute;inset:0;z-index:0;}
  .cs-impact-bg>div{height:100%!important;aspect-ratio:unset!important;}
  .cs-impact-bg img{width:100%;height:100%;object-fit:cover;}
  .cs-impact-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(20,21,25,.96) 0%,rgba(20,21,25,.88) 55%,rgba(20,21,25,.6) 100%);}
  .cs-impact-content{position:relative;z-index:1;padding:96px 80px;max-width:640px;}
  .cs-impact-stats{display:flex;gap:48px;margin-top:40px;flex-wrap:wrap;}
  .cs-impact-stat{border-left:2px solid var(--accent);padding-left:20px;}
  .cs-impact-val{font-size:clamp(32px,3.5vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1;}
  .cs-impact-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,232,228,.45);margin-top:6px;}

  /* Challenge image area */
  .cs-challenge .cs-two-col-img{}

  /* Role */
  .cs-role .cs-two-col-img{display:flex;justify-content:center;}

  /* Footer */
  .cs-foot{display:flex;justify-content:space-between;align-items:center;padding:40px 80px;border-top:1px solid var(--border);font-size:12px;letter-spacing:.06em;}
  .cs-foot-link{color:rgba(232,232,228,.45);text-decoration:none;transition:color .2s;}
  .cs-foot-link:hover{color:var(--accent);}

  /* Mobile */
  @media(max-width:900px){
    .cs-top{padding:14px 20px;}
    .cs-breadcrumb{display:none;}
    .cs-hero{grid-template-columns:1fr;padding:56px 24px 64px;min-height:auto;gap:40px;}
    .cs-hero-img{order:-1;}
    .cs-section{padding:60px 24px;}
    .cs-two-col,.cs-two-col-rev{grid-template-columns:1fr;gap:32px;}
    .cs-stats-row{grid-template-columns:1fr 1fr;gap:24px;}
    .cs-insights{grid-template-columns:1fr;gap:0;}
    .cs-insights-divider{width:100%;height:1px;}
    .cs-insights-col{padding:28px 24px;}
    .cs-personas{grid-template-columns:1fr;}
    .cs-principles-grid{grid-template-columns:1fr;}
    .cs-impact-content{padding:64px 24px;}
    .cs-impact-stats{gap:28px;}
    .cs-foot{padding:32px 24px;flex-direction:column;gap:16px;text-align:center;}
    .cs-impact-bg::after{background:linear-gradient(to bottom,rgba(20,21,25,.98) 0%,rgba(20,21,25,.9) 100%);}
  }
  @media(max-width:480px){
    .cs-stats-row{grid-template-columns:1fr;}
  }
`;

ReactDOM.createRoot(document.getElementById('root')).render(<CS01App/>);
</script>
</body>
</html>
