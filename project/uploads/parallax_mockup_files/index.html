<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match App Parallax Hero</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="hero-parallax" aria-label="Dating app mockup parallax hero">
      <div class="parallax-layer bg-glow" data-speed="0.12"></div>
      <img class="parallax-layer heart-line heart-left" src="assets/heart-line.svg" alt="" data-speed="0.32" />
      <img class="parallax-layer heart-line heart-right" src="assets/heart-line.svg" alt="" data-speed="0.22" />
      <div class="parallax-layer orb orb-one" data-speed="0.18"></div>
      <div class="parallax-layer orb orb-two" data-speed="0.28"></div>

      <div class="hero-content" data-speed="0.04">
        <p class="eyebrow">Human matchmaking, beautifully managed</p>
        <h1>Meaningful matches start with people.</h1>
        <p class="subtitle">A clean dashboard and profile experience for matchmakers, candidates, and real human connection.</p>
      </div>

      <img class="parallax-layer phones" src="assets/phones-mockup.png" alt="Two iPhone mockups showing the matchmaking app" data-speed="-0.06" />
    </section>

    <section class="after-section">
      <h2>Scroll-based parallax demo</h2>
      <p>Upload this folder to Claude Code and connect the section to your site.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
