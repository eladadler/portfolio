<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Case Study — Elad Adler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<body>
<div id="root"></div>
<script type="text/babel">
// ═══════════════════════════════════════════════════════════════════
// SHARED CONFIG
// ═══════════════════════════════════════════════════════════════════
const GH_REPO = 'eladadler/portfolio';
const GH_FILE = 'portfolio-content.json';
const GH_TOKEN_KEY = 'elad_gh_token';
const CONTENT_KEY = 'elad_portfolio_v2';

const PROJECT_IDS = ['01','02','03','04'];
const PROJECT_TITLES = { '01':'Sababa & All','02':'ShiftWise','03':'Balance','04':'BibleConnect' };

function getUrlId() {
  const p = new URLSearchParams(window.location.search);
  const id = p.get('id') || '01';
  return PROJECT_IDS.includes(id) ? id : '01';
}

// ═══════════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
async function fetchRemoteContent() {
  try {
    const res = await fetch('./' + GH_FILE + '?t=' + Date.now());
    if (!res.ok) return null;
    const j = await res.json();
    if (j && typeof j === 'object' && Object.keys(j).length > 0) return j;
  } catch {}
  return null;
}

async function pushToGitHub(content, token) {
  const api = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
  let sha = '';
  try {
    const r = await fetch(api, { headers: { Authorization: 'token ' + token } });
    if (r.ok) { const d = await r.json(); sha = d.sha || ''; }
  } catch {}
  const json = JSON.stringify(content, null, 2);
  const bytes = new TextEncoder().encode(json);
  const b64 = btoa(Array.from(bytes, b => String.fromCharCode(b)).join(''));
  const body = { message: 'Update portfolio content', content: b64, ...(sha ? { sha } : {}) };
  const res = await fetch(api, {
    method: 'PUT',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'GitHub API error ' + res.status);
  }
}

// ═══════════════════════════════════════════════════════════════════
// IMAGE COMPRESSION
// ═══════════════════════════════════════════════════════════════════
function compressImage(file, maxPx = 1600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { naturalWidth: w, naturalHeight: h } = img;
      if (w > maxPx || h > maxPx) { const r = maxPx / Math.max(w, h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════════════════
// EDIT CONTEXT
// ═══════════════════════════════════════════════════════════════════
const EditCtx = React.createContext({ em: false, cs: {}, upCs: () => {}, flash: () => {} });

function setIn(obj, path, val) {
  if (!path || path.length === 0) return val;
  const [h, ...rest] = path;
  if (Array.isArray(obj)) { const a = [...obj]; a[h] = setIn(a[h], rest, val); return a; }
  return { ...obj, [h]: setIn(obj ? obj[h] : undefined, rest, val) };
}

// Editable field
function E({ v = '', tag: T = 'span', multi = false, cn = '', st, path }) {
  const { em, upCs, flash } = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const committed = React.useRef(v);
  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!el || !em) return;
    if (committed.current !== v) {
      committed.current = v;
      if (multi) el.innerText = v; else el.textContent = v;
    }
  }, [v, em, multi]);
  if (!em) return <T className={cn} style={st}>{v}</T>;
  const save = (e) => {
    const nv = (multi ? e.currentTarget.innerText : e.currentTarget.textContent).trim();
    if (nv !== committed.current) { committed.current = nv; if (path) upCs(path, nv); flash(); }
  };
  return (
    <T ref={ref} className={cn ? cn + ' ed-f' : 'ed-f'} style={st}
      contentEditable suppressContentEditableWarning onBlur={save}
      onKeyDown={multi ? undefined : (e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
    >{v}</T>
  );
}

// Image replace button
function ReplaceImgBtn({ path }) {
  const { em, upCs, flash } = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const [busy, setBusy] = React.useState(false);
  if (!em) return null;
  const pick = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    e.target.value = '';
    setBusy(true);
    try {
      const dataUrl = await compressImage(f);
      upCs(path, dataUrl); flash();
    } catch {
      const reader = new FileReader();
      reader.onload = (ev) => { upCs(path, ev.target.result); flash(); };
      reader.readAsDataURL(f);
    } finally { setBusy(false); }
  };
  return (
    <div className="img-replace" onClick={() => !busy && ref.current.click()}>
      <span>{busy ? '⏳ Processing…' : '↑ Replace image'}</span>
      <input ref={ref} type="file" accept="image/png,image/jpeg,image/webp,image/avif" hidden onChange={pick} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════
const DEFAULT_CS = {
  heroSub: "Case study — replace with your subtitle",
  coverImage: null,
  overview: "Overview text — describe the project in 2-3 sentences.",
  challenge: "The challenge — what problem needed solving and why it mattered.",
  process: [
    { step: "01", title: "Discovery", text: "Describe your research and discovery process." },
    { step: "02", title: "Design", text: "Describe your design approach and decisions." },
    { step: "03", title: "Delivery", text: "Describe how you built, tested, and shipped." },
  ],
  outcome: "The outcome — what changed as a result of the work.",
  stats: [
    { value: "—", label: "metric one" },
    { value: "—", label: "metric two" },
    { value: "—", label: "metric three" },
  ],
  gallery: [
    { image: null, caption: "Screen or artefact 01" },
    { image: null, caption: "Screen or artefact 02" },
    { image: null, caption: "Screen or artefact 03" },
  ],
};

function CaseStudyApp() {
  const id = getUrlId();
  const title = PROJECT_TITLES[id] || 'Case Study';

  const [allContent, setAllContent] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem(CONTENT_KEY));
      if (s && s.caseStudies && s.caseStudies[id]) return s;
    } catch {}
    return null;
  });
  const cs = React.useMemo(() => {
    const saved = allContent && allContent.caseStudies && allContent.caseStudies[id];
    return { ...DEFAULT_CS, ...(saved || {}) };
  }, [allContent, id]);

  const [em, setEm] = React.useState(false);
  const [showSaved, setShowSaved] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState('');
  const savedTimer = React.useRef(null);
  const syncTimer = React.useRef(null);

  // Load remote content on mount
  React.useEffect(() => {
    fetchRemoteContent().then(remote => {
      if (!remote) return;
      setAllContent(prev => {
        const merged = { ...(prev || {}), ...remote };
        try { localStorage.setItem(CONTENT_KEY, JSON.stringify(merged)); } catch {}
        return merged;
      });
    });
  }, []);

  // Update page title
  React.useEffect(() => {
    document.title = title + ' — Case Study · Elad Adler';
  }, [title]);

  const flash = React.useCallback(() => {
    setShowSaved(true);
    clearTimeout(savedTimer.current);
    savedTimer.current = setTimeout(() => setShowSaved(false), 1800);
  }, []);

  const showSync = (msg) => {
    setSyncMsg(msg);
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => setSyncMsg(''), 4000);
  };

  const upCs = React.useCallback((path, val) => {
    setAllContent(prev => {
      const base = prev || {};
      const caseStudies = base.caseStudies || {};
      const current = caseStudies[id] || {};
      const next = setIn(current, path, val);
      const updated = { ...base, caseStudies: { ...caseStudies, [id]: next } };
      try { localStorage.setItem(CONTENT_KEY, JSON.stringify(updated)); } catch {}
      return updated;
    });
  }, [id]);

  const handlePush = React.useCallback(async () => {
    let token = localStorage.getItem(GH_TOKEN_KEY) || '';
    if (!token) {
      token = window.prompt('Enter your GitHub personal access token:');
      if (!token) return;
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
      token = token.trim();
    }
    setSyncing(true);
    setSyncMsg('');
    try {
      const full = allContent || {};
      await pushToGitHub(full, token);
      showSync('✓ Saved to GitHub — live in ~60s');
    } catch (e) {
      showSync('✗ ' + e.message);
    } finally { setSyncing(false); }
  }, [allContent]);

  const nextId = PROJECT_IDS[(PROJECT_IDS.indexOf(id) + 1) % PROJECT_IDS.length];
  const prevId = PROJECT_IDS[(PROJECT_IDS.indexOf(id) - 1 + PROJECT_IDS.length) % PROJECT_IDS.length];

  const editCtx = React.useMemo(() => ({ em, cs, upCs, flash }), [em, cs, upCs, flash]);

  return (
    <EditCtx.Provider value={editCtx}>
    <div className="cs-wrap">
      <style>{CSS}</style>

      {em && <div className="ed-bar"/>}

      {/* Save toast */}
      <div className="save-toast" style={{ opacity: showSaved ? 1 : 0, transform: `translateX(-50%) translateY(${showSaved ? 0 : '-8px'})` }}>
        ✓ saved locally — click ☁ Save to publish
      </div>

      {/* Top Bar */}
      <header className="cs-topbar mono">
        <a href="./index.html" className="cs-back">← Elad Adler</a>
        <span className="cs-breadcrumb">{id} / case study</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {syncMsg && <span style={{fontSize:11,color:syncMsg.startsWith('✓')?"#7184FF":"#e05252"}}>{syncMsg}</span>}
          <button className={"cs-btn"+(em?" cs-btn-accent":"")} disabled={syncing} onClick={handlePush}>
            {syncing ? '↑ Saving…' : '☁ Save'}
          </button>
          <button className={"cs-btn"+(em?" cs-btn-on":"")} onClick={() => setEm(v => !v)}>
            {em ? '✓ Done' : '✎ Edit'}
          </button>
        </div>
      </header>

      {/* Hero */}
      <section className="cs-hero">
        <div className="cs-hero-meta mono">
          <span className="cs-num">{id}</span>
          <span className="cs-proj-title">{title}</span>
        </div>
        <h1 className="cs-hero-h1">
          <E v={cs.heroSub} tag="span" path={['heroSub']}/>
        </h1>
        <div className="cs-cover" style={{position:"relative"}}>
          {cs.coverImage
            ? <img src={cs.coverImage} alt={title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            : <div className="cs-cover-placeholder mono">[ drop cover image — {title} ]</div>
          }
          <ReplaceImgBtn path={['coverImage']}/>
        </div>
      </section>

      {/* Overview + Stats */}
      <section className="cs-overview">
        <div className="cs-overview-text">
          <div className="cs-label mono">OVERVIEW</div>
          <E v={cs.overview} tag="p" multi path={['overview']} cn="cs-body-large"/>
        </div>
        <div className="cs-stats">
          {cs.stats.map((s, si) => (
            <div key={si} className="cs-stat">
              <E v={s.value} tag="div" path={['stats', si, 'value']} cn="cs-stat-val"/>
              <E v={s.label} tag="div" path={['stats', si, 'label']} cn="cs-stat-label mono"/>
            </div>
          ))}
        </div>
      </section>

      {/* Challenge */}
      <section className="cs-section">
        <div className="cs-label mono">THE CHALLENGE</div>
        <E v={cs.challenge} tag="p" multi path={['challenge']} cn="cs-body-large cs-challenge-text"/>
      </section>

      {/* Process */}
      <section className="cs-section">
        <div className="cs-label mono">PROCESS</div>
        <div className="cs-process-grid">
          {cs.process.map((step, si) => (
            <div key={si} className="cs-step">
              <div className="cs-step-num mono">{step.step}</div>
              <E v={step.title} tag="h3" path={['process', si, 'title']} cn="cs-step-title"/>
              <E v={step.text} tag="p" multi path={['process', si, 'text']} cn="cs-step-body"/>
            </div>
          ))}
        </div>
      </section>

      {/* Gallery */}
      <section className="cs-gallery-section">
        <div className="cs-label mono" style={{padding:"0 80px",marginBottom:24}}>SCREENS & ARTEFACTS</div>
        <div className="cs-gallery">
          {cs.gallery.map((g, gi) => (
            <figure key={gi} className="cs-gallery-item" style={{margin:0}}>
              <div className="cs-gallery-img" style={{position:"relative"}}>
                {g.image
                  ? <img src={g.image} alt={g.caption} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  : <div className="cs-img-placeholder mono">[ {g.caption} ]</div>
                }
                <ReplaceImgBtn path={['gallery', gi, 'image']}/>
              </div>
              <E v={g.caption} tag="figcaption" path={['gallery', gi, 'caption']} cn="cs-caption mono"/>
            </figure>
          ))}
        </div>
      </section>

      {/* Outcome */}
      <section className="cs-section cs-outcome-section">
        <div className="cs-label mono">THE OUTCOME</div>
        <E v={cs.outcome} tag="p" multi path={['outcome']} cn="cs-body-large cs-outcome-text"/>
      </section>

      {/* Footer nav */}
      <footer className="cs-footer mono">
        <a href={"./case-study.html?id="+prevId} className="cs-nav-link">← {PROJECT_TITLES[prevId]}</a>
        <a href="./index.html#work" className="cs-nav-home">↑ All projects</a>
        <a href={"./case-study.html?id="+nextId} className="cs-nav-link">
          {PROJECT_TITLES[nextId]} →
        </a>
      </footer>
    </div>
    </EditCtx.Provider>
  );
}
