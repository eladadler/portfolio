<script>
(() => {
  const STATE_KEY = '__image_slots__';
  const MAX_DIM = 1200;
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  const subs = new Set();
  let slots = {};
  try { slots = JSON.parse(sessionStorage.getItem(STATE_KEY) || '{}'); } catch {}

  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }
  function setSlot(id, val) {
    if (!id) return;
    if (val) slots[id] = val; else delete slots[id];
    try { sessionStorage.setItem(STATE_KEY, JSON.stringify(slots)); } catch {}
    subs.forEach((fn) => fn());
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally { bitmap.close && bitmap.close(); }
  }

  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.06)}' +
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;pointer-events:none;-webkit-user-drag:none;user-select:none;box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.35}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em;color:rgba(255,255,255,.5)}' +
    '.empty .sub{font-size:11px;color:rgba(255,255,255,.35)}' +
    '.empty .sub u{text-underline-offset:2px}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;background:rgba(201,100,66,.1)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(255,255,255,.2);transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;white-space:nowrap}' +
    ':host([data-filled]:hover) .ctl{opacity:1;pointer-events:auto}' +
    ':host([data-reframe]) .ctl{opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() { return ['shape','radius','mask','fit','position','placeholder','src','id']; }
    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace">Replace</button><button data-act="clear">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0; this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') { this._exitReframe(false); this._gen++; this._local = null; if (this.id) setSlot(this.id, null); else this._render(); }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      this._img.addEventListener('load', () => this._applyView());
      this.addEventListener('dblclick', (e) => {
        if (!this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true); else this._enterReframe();
      });
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault(); e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1, sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw, cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux + (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView(); this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView(); this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView(); this._applyView();
      }, { passive: false });
    }
    connectedCallback() {
      this.addEventListener('dragenter', this); this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this); this.addEventListener('drop', this);
      subs.add(this._subFn);
      this._ro = new ResizeObserver(() => this._render()); this._ro.observe(this);
      this._render();
    }
    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this); this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this); this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }
    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      this._outside = (e) => { if (e.composedPath && e.composedPath().includes(this)) return; this._exitReframe(true); };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }
    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe'); this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }
    attributeChangedCallback() { if (this.shadowRoot) this._render(); }
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        e.preventDefault(); e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault(); e.stopPropagation();
        this._depth = 0; this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }
    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) { this._setError('Drop a PNG, JPEG, WebP, or AVIF image.'); return; }
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) { if (gen !== this._gen) return; this._setError('Could not read that image.'); }
    }
    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div'); d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d); this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }
    _reframes() { return this.hasAttribute('data-filled') && (this.getAttribute('fit') || 'cover') === 'cover'; }
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }
    _clampView() {
      const g = this._geom(); if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }
    _applyView() {
      const g = this._geom(); const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        this._img.style.width = '100%'; this._img.style.height = '100%';
        this._img.style.left = '50%'; this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%'; return;
      }
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%', h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%', t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t; this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }
    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      if (this.id) setSlot(this.id, v); else { this._local = v; }
    }
    _render() {
      const mask = this.getAttribute('mask'); const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') { const n = parseFloat(this.getAttribute('radius')); radius = (Number.isFinite(n) ? n : 12) + 'px'; }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || ''; this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      if (url) {
        if (this._img.getAttribute('src') !== url) { this._img.src = url; this._ghost.src = url; }
        this._img.style.display = 'block'; this._empty.style.display = 'none';
        this.setAttribute('data-filled', ''); this._clampView(); this._applyView();
      } else {
        this._img.style.display = 'none'; this._img.removeAttribute('src'); this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex'; this.removeAttribute('data-filled');
      }
    }
  }
  if (!customElements.get('image-slot')) customElements.define('image-slot', ImageSlot);
})();
</script>

const CONTENT_KEY = 'elad_portfolio_v2';
const GH_REPO = 'eladadler/portfolio';
const GH_FILE = 'portfolio-content.json';
const GH_TOKEN_KEY = 'elad_gh_token';

function setIn(obj, path, val) {
  if (!path || path.length === 0) return val;
  const [h, ...rest] = path;
  if (Array.isArray(obj)) {
    const a = [...obj];
    a[h] = setIn(a[h], rest, val);
    return a;
  }
  return { ...obj, [h]: setIn(obj ? obj[h] : undefined, rest, val) };
}

function mergeWithDefaults(saved) {
  const result = JSON.parse(JSON.stringify(DEFAULT_CONTENT));
  if (!saved || typeof saved !== 'object') return result;
  for (const k of Object.keys(result)) {
    if (k in saved) result[k] = saved[k];
  }
  return result;
}

function loadContent() {
  try {
    const s = JSON.parse(localStorage.getItem(CONTENT_KEY));
    if (s && typeof s === 'object') return mergeWithDefaults(s);
  } catch {}
  return DEFAULT_CONTENT;
}

async function fetchRemoteContent() {
  try {
    const res = await fetch('./' + GH_FILE + '?t=' + Date.now());
    if (!res.ok) return null;
    const j = await res.json();
    if (j && typeof j === 'object' && Object.keys(j).length > 0) return j;
  } catch {}
  return null;
}

async function pushToGitHub(content, token) {
  const api = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
  let sha = '';
  try {
    const r = await fetch(api, { headers: { Authorization: 'token ' + token } });
    if (r.ok) { const d = await r.json(); sha = d.sha || ''; }
  } catch {}
  const json = JSON.stringify(content, null, 2);
  const bytes = new TextEncoder().encode(json);
  const b64 = btoa(Array.from(bytes, b => String.fromCharCode(b)).join(''));
  const body = { message: 'Update portfolio content', content: b64, ...(sha ? { sha } : {}) };
  const res = await fetch(api, {
    method: 'PUT',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'GitHub API error ' + res.status);
  }
}

// E = Editable field. Static in view mode, contenteditable in edit mode.
// path: array like ['bioShort'] or ['projects', 0, 'title']
function E({ v = '', tag: T = 'span', multi = false, cn = '', st, path }) {
  const { em, up, flash } = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const committed = React.useRef(v);

  // Sync DOM if value changed from outside (e.g. after reset)
  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!el || !em) return;
    if (committed.current !== v) {
      committed.current = v;
      if (multi) el.innerText = v; else el.textContent = v;
    }
  }, [v, em, multi]);

  if (!em) return <T className={cn} style={st}>{v}</T>;

  const save = (e) => {
    const nv = (multi ? e.currentTarget.innerText : e.currentTarget.textContent).trim();
    if (nv !== committed.current) {
      committed.current = nv;
      if (path) up(path, nv);
      flash();
    }
  };

  return (
    <T ref={ref} className={cn ? cn + ' ed-f' : 'ed-f'} style={st}
      contentEditable suppressContentEditableWarning
      onBlur={save}
      onKeyDown={multi ? undefined : (e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
    >{v}</T>
  );
}

// Replace-image button that overlays on a project image in edit mode
function compressImage(file, maxPx = 1600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { naturalWidth: w, naturalHeight: h } = img;
      if (w > maxPx || h > maxPx) {
        const r = maxPx / Math.max(w, h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

function ReplaceImgBtn({ path }) {
  const { em, up, flash } = React.useContext(EditCtx);
  const ref = React.useRef(null);
  const [busy, setBusy] = React.useState(false);
  if (!em) return null;
  const pick = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    e.target.value = '';
    setBusy(true);
    try {
      const dataUrl = await compressImage(f);
      up(path, dataUrl); flash();
    } catch {
      const reader = new FileReader();
      reader.onload = (ev) => { up(path, ev.target.result); flash(); };
      reader.readAsDataURL(f);
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="img-replace" onClick={() => !busy && ref.current.click()}>
      <span>{busy ? '⏳ Processing…' : '↑ Replace image'}</span>
      <input ref={ref} type="file" accept="image/png,image/jpeg,image/webp,image/avif" hidden onChange={pick} />
    </div>
  );
}

// DOT FIELD
// ═══════════════════════════════════════════════════════════════════
function CDotField({ active, inkRgb, accentRgb, reduce }) {
  const cvs = React.useRef(null);
  const S = React.useRef({ dots:[], mouse:{x:-9999,y:-9999}, raf:0, w:0, h:0 });
  React.useEffect(() => {
    if (!active) return;
    const canvas = cvs.current, ctx = canvas.getContext("2d"), s = S.current;
    const GAP=34, R=150;
    const build = () => {
      const dpr=Math.min(window.devicePixelRatio||1,2);
      s.w=window.innerWidth; s.h=window.innerHeight;
      canvas.width=s.w*dpr; canvas.height=s.h*dpr;
      canvas.style.width=s.w+"px"; canvas.style.height=s.h+"px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
      const cols=Math.ceil(s.w/GAP)+1, rows=Math.ceil(s.h/GAP)+1;
      const ox=(s.w-(cols-1)*GAP)/2, oy=(s.h-(rows-1)*GAP)/2;
      s.dots=[];
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){const bx=ox+c*GAP,by=oy+r*GAP;s.dots.push({bx,by,x:bx,y:by});}
    };
    const draw = () => {
      ctx.clearRect(0,0,s.w,s.h);
      const mx=s.mouse.x,my=s.mouse.y;
      for(const d of s.dots){
        const dx=mx-d.bx,dy=my-d.by,dist=Math.hypot(dx,dy);
        let tx=d.bx,ty=d.by,glow=0;
        if(!reduce&&dist<R){const f=1-dist/R,pull=f*f*0.6;tx=d.bx+dx*pull;ty=d.by+dy*pull;glow=f;}
        d.x+=(tx-d.x)*0.15; d.y+=(ty-d.y)*0.15;
        const rad=1.3+glow*2.2;
        ctx.beginPath();
        ctx.fillStyle=glow>0.02?`rgba(${accentRgb},${(0.18+glow*0.55).toFixed(3)})`:`rgba(${inkRgb},0.16)`;
        ctx.arc(d.x,d.y,rad,0,Math.PI*2); ctx.fill();
      }
      s.raf=requestAnimationFrame(draw);
    };
    const mv=(e)=>{s.mouse.x=e.clientX;s.mouse.y=e.clientY;};
    const ml=()=>{s.mouse.x=-9999;s.mouse.y=-9999;};
    build(); draw();
    window.addEventListener("resize",build); window.addEventListener("mousemove",mv); window.addEventListener("mouseout",ml);
    return()=>{cancelAnimationFrame(s.raf);window.removeEventListener("resize",build);window.removeEventListener("mousemove",mv);window.removeEventListener("mouseout",ml);};
  }, [active, inkRgb, accentRgb, reduce]);
  if (!active) return null;
  return <canvas ref={cvs} style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none"}} aria-hidden="true"/>;
}

// HEADING FX
// ═══════════════════════════════════════════════════════════════════
function FxHeading({ text, parts, fx, block }) {
  const segs = parts || [{ text }];
  const refs = React.useRef([]);
  const raf = React.useRef(0);
  React.useEffect(() => () => cancelAnimationFrame(raf.current), []);
  const scramble = () => {
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*<>/0123456789";
    const total=segs.reduce((n,s)=>n+s.text.length,0);
    const start=performance.now(), dur=Math.min(300+total*14,900);
    const tick=(t)=>{
      const p=Math.min((t-start)/dur,1), reveal=p*total;
      let base=0;
      segs.forEach((s,si)=>{
        let out="";
        for(let i=0;i<s.text.length;i++){
          const ch=s.text[i];
          if(ch===" "||ch==="&"||ch===","||ch==="."){out+=ch;continue;}
          out+=(base+i)<reveal?ch:chars[(Math.random()*chars.length)|0];
        }
        const el=refs.current[si]; if(el)el.textContent=out;
        base+=s.text.length;
      });
      if(p<1)raf.current=requestAnimationFrame(tick);
      else segs.forEach((s,si)=>{const el=refs.current[si];if(el)el.textContent=s.text;});
    };
    cancelAnimationFrame(raf.current); raf.current=requestAnimationFrame(tick);
  };
  const isScramble=fx==="Scramble";
  const fxCls=isScramble?"fx-scramble":(fx&&fx!=="None"?"fx-"+fx.toLowerCase():"");
  const cls="fx-heading"+(block?" fx-heading-block":"")+(fxCls?" "+fxCls:"");
  return <span className={cls} onMouseEnter={isScramble?scramble:undefined}>{segs.map((s,si)=><span key={si} ref={el=>refs.current[si]=el} className={s.hl?"c-hl":undefined}>{s.text}</span>)}</span>;
}

// ═══════════════════════════════════════════════════════════════════
// PARALLAX IMAGE
// ═══════════════════════════════════════════════════════════════════
function ParallaxImage({ src, alt, amount }) {
  const wrapRef=React.useRef(null), imgRef=React.useRef(null);
  React.useEffect(()=>{
    const wrap=wrapRef.current,img=imgRef.current;
    if(!wrap||!img)return;
    const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
    if(reduce||!amount){img.style.transform="translate3d(0,0,0)";return;}
    let ticking=false;
    const update=()=>{
      ticking=false;
      const rect=wrap.getBoundingClientRect();
      const span=Math.abs(img.offsetHeight-rect.height);
      if(!span){img.style.transform="translate3d(0,0,0)";return;}
      const vh=window.innerHeight;
      const p=(vh-rect.top)/(vh+rect.height);
      const c=Math.max(0,Math.min(1,p));
      const shift=(c-0.5)*2*(span/2)*0.9*amount;
      img.style.transform=`translate3d(0,${shift.toFixed(1)}px,0)`;
    };
    const onScroll=()=>{if(!ticking){requestAnimationFrame(update);ticking=true;}};
    window.addEventListener("scroll",onScroll,{passive:true});
    window.addEventListener("resize",update);
    if(!img.complete)img.addEventListener("load",update);
    update();
    return()=>{window.removeEventListener("scroll",onScroll);window.removeEventListener("resize",update);img.removeEventListener("load",update);};
  },[amount,src]);
  return (
    <div ref={wrapRef} style={{position:"absolute",inset:0,overflow:"hidden",background:"#231431"}}>
      <div style={{position:"absolute",inset:"-6%",backgroundImage:`url('${src}')`,backgroundSize:"cover",backgroundPosition:"center",filter:"blur(28px) brightness(0.8) saturate(1.05)",transform:"scale(1.08)"}}/>
      <img ref={imgRef} src={src} alt={alt} style={{position:"absolute",left:0,top:"50%",translate:"0 -50%",width:"100%",height:"auto",display:"block",willChange:"transform",transform:"translate3d(0,0,0)",boxShadow:"0 24px 60px rgba(0,0,0,0.32)"}}/>
    </div>
  );
}

// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════
const TWEAK_DEFAULTS = { theme:"Ink (Dark)", texture:"Cursor", accent:"", projectsLayout:"Spreads", alternateSides:true, headingFx:"Scramble", parallax:"Subtle" };

function DirectionCLive() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [content, setContent] = React.useState(loadContent);
  const [em, setEm] = React.useState(false);
  const [showSaved, setShowSaved] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState('');
  const savedTimer = React.useRef(null);
  const syncTimer = React.useRef(null);

  // Load remote content.json on first visit (source of truth over localStorage)
  React.useEffect(() => {
    fetchRemoteContent().then(remote => {
      if (!remote) return;
      const merged = mergeWithDefaults(remote);
      setContent(merged);
      try { localStorage.setItem(CONTENT_KEY, JSON.stringify(merged)); } catch {}
    });
  }, []);

  const flash = React.useCallback(() => {
    setShowSaved(true);
    clearTimeout(savedTimer.current);
    savedTimer.current = setTimeout(() => setShowSaved(false), 1600);
  }, []);

  const showSync = (msg) => {
    setSyncMsg(msg);
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => setSyncMsg(''), 4000);
  };

  const up = React.useCallback((path, val) => {
    setContent(prev => {
      const next = setIn(prev, path, val);
      try { localStorage.setItem(CONTENT_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const handlePush = React.useCallback(async () => {
    let token = localStorage.getItem(GH_TOKEN_KEY) || '';
    if (!token) {
      token = window.prompt('Enter your GitHub personal access token (stored locally, needed once):');
      if (!token) return;
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
      token = token.trim();
    }
    setSyncing(true);
    setSyncMsg('');
    try {
      await pushToGitHub(content, token);
      showSync('✓ Saved to GitHub — live in ~60s');
    } catch (e) {
      showSync('✗ ' + e.message);
    } finally {
      setSyncing(false);
    }
  }, [content]);

  const reset = React.useCallback(() => {
    if (window.confirm('Reset all text content to defaults?')) {
      localStorage.removeItem(CONTENT_KEY);
      setContent(DEFAULT_CONTENT);
    }
  }, []);

  const theme = C_THEMES[tweaks.theme] || C_THEMES["Ink (Dark)"];
  const tex = C_TEXTURES[tweaks.texture] || C_TEXTURES["Cursor"];
  const accentHex = tweaks.accent || theme.accent;
  const accentRgb = rgb(accentHex);
  const accentBright = tweaks.accent ? lighten(accentHex, 0.24) : theme.accentBright;
  const isDark = tweaks.theme.includes("Dark");
  const reduce = typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;

  const rootStyle = {
    "--bg":theme.bg, "--ink":theme.ink, "--ink-rgb":theme.inkRgb,
    "--accent":accentHex, "--accent-rgb":accentRgb, "--accent-bright":accentBright,
    "--surface":theme.surface, "--invert-bg":theme.invertBg, "--invert-text":theme.invertText, "--invert-rgb":theme.invertRgb,
    "--tex-image":tex.image, "--tex-size":tex.size,
  };

  const editCtx = React.useMemo(() => ({ em, content, up, flash }), [em, content, up, flash]);

  return (
    <EditCtx.Provider value={editCtx}>
    <div className="dirC" style={rootStyle}>
      <style>{CSS}</style>
      <GrainOverlay opacity={isDark ? 0.09 : 0.05} />
      <CDotField active={tweaks.texture === "Cursor"} inkRgb={theme.inkRgb} accentRgb={accentRgb} reduce={reduce} />
      {em && <div className="ed-bar" />}
      <SaveToast show={showSaved} />

      <div style={{position:"relative",zIndex:1}}>

        {/* ── Top Bar ── */}
        <header className="c-topbar">
          <E v={content.kicker.includes("ux/ui") ? "Elad Adler" : content.kicker} tag="span" cn="c-logo mono" path={['kicker']}
            st={{fontFamily:"'Archivo',sans-serif", fontWeight:700, letterSpacing:"-.01em", fontSize:15}}>
          </E>
          {/* Override with just the logo name */}
          <span className="c-logo" style={{position:"absolute",left:80}}>
            <span style={{fontWeight:700,letterSpacing:"-.01em",fontSize:15}}>Elad Adler</span><span className="cobalt">®</span>
          </span>
          <nav className="mono">
            <a href="#work">Work</a><a href="#about">About</a><a href="#design">Design</a><a href="#photos">Photos</a><a href="#contact">Contact</a>
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {syncMsg && <span className="mono" style={{fontSize:11,color:syncMsg.startsWith('✓')?"var(--accent)":"#e05252",transition:"opacity .3s"}}>{syncMsg}</span>}
            <span className="c-avail mono"><span className="dot"/>AVAILABLE — 2026</span>
            <button className="ed-toggle mono off" disabled={syncing} onClick={handlePush}
              title="Save all content + images to GitHub">
              {syncing ? '↑ Saving…' : '☁ Save'}
            </button>
            <button className={"ed-toggle mono "+(em?"on":"off")} onClick={() => setEm(v => !v)}>
              {em ? "✓ Done" : "✎ Edit"}
            </button>
          </div>
        </header>

        {/* ── Hero ── */}
        <section className="c-hero">
          <E v={content.kicker} tag="div" path={['kicker']} cn="c-kicker mono"/>
          <h1>
            {em ? (
              <>
                <E v={content.heroT1} tag="span" path={['heroT1']}/>
                <E v={content.heroT2} tag="span" path={['heroT2']} cn="c-hl"/>
                <E v={content.heroT3} tag="span" path={['heroT3']}/>
              </>
            ) : (
              <FxHeading block fx={tweaks.headingFx} parts={[
                {text:content.heroT1}, {text:content.heroT2, hl:true}, {text:content.heroT3}
              ]}/>
            )}
          </h1>
          <div className="sub">
            <E v={content.bioShort} tag="p" multi path={['bioShort']}/>
            <div className="c-stickers mono">
              {content.stickers.map((s,i) => (
                <E key={i} v={s} tag="span" path={['stickers',i]} cn={"c-sticker"+(i===1?" blue":"")}/>
              ))}
            </div>
          </div>
        </section>

        {/* ── Projects ── */}
        <div className="c-secthead" id="work">
          <span className="t">Selected work</span>
          <span className="n mono cobalt">(01–04 of 07)</span>
        </div>
        {tweaks.projectsLayout === "Spreads"
          ? <CProjectsSpread alternate={tweaks.alternateSides} headingFx={tweaks.headingFx} parallax={C_PAR[tweaks.parallax]??0.55}/>
          : <CProjectsGrid headingFx={tweaks.headingFx}/>}
        <div className="c-slots mono">
          {content.projectSlots.map((s,si) => (
            <div key={s.num} className="c-slot">
              <span className="n">{s.num}</span>
              <E v={s.note} tag="span" path={['projectSlots',si,'note']}/>
            </div>
          ))}
        </div>

        {/* ── About ── */}
        <section className="c-about" id="about">
          <div className="left">
            <E v={content.aboutTitle} tag="h2" path={['aboutTitle']}/>
            <E v={content.bioLong} tag="p" multi path={['bioLong']}/>
            <E v={content.aboutQuote} tag="p" path={['aboutQuote']} cn="mono cobalt" st={{fontSize:13}}/>
          </div>
          <div className="right">
            {content.facts.map((f,fi) => (
              <div key={fi} className="c-fact">
                <E v={f.k} tag="span" path={['facts',fi,'k']} cn="k mono"/>
                <E v={f.v} tag="span" path={['facts',fi,'v']}/>
              </div>
            ))}
          </div>
        </section>

        {/* ── Industrial Design ── */}
        <CIndustrialDesign />

        {/* ── Photos ── */}
        <div className="c-secthead" id="photos" style={{marginTop:0}}>
          <E v={content.photosHeading} tag="span" cn="t" path={['photosHeading']}/>
          <E v={content.photosSubhead} tag="span" cn="n mono cobalt" path={['photosSubhead']}/>
        </div>
        <div className="c-strip">
          {content.photos.map((ph,pi) => (
            <figure key={ph.id} className="c-shot" style={{margin:0}}>
              <image-slot id={"c-shot-"+ph.id} shape="rounded" radius="5" fit="cover" placeholder="Drop photo" style={{display:"block",width:"100%",height:"180px"}}/>
              <E v={ph.caption} tag="figcaption" path={['photos',pi,'caption']} cn="cap mono"/>
            </figure>
          ))}
        </div>

        {/* ── Footer ── */}
        <footer className="c-footer" id="contact">
          <h2 className="big">
            <E v={content.footerH1} tag="span" path={['footerH1']}/>
            <E v={content.footerH2} tag="span" path={['footerH2']} st={{color:"var(--accent-bright)"}}/>
          </h2>
          <div className="c-links">
            {content.links.map((l,li) => (
              <div key={li} style={{display:"flex",flexDirection:"column",alignItems:"flex-start"}}>
                {em ? (
                  <>
                    <E v={l.label} tag="span" path={['links',li,'label']}
                      st={{color:"var(--invert-bg)",background:"var(--invert-text)",textDecoration:"none",fontSize:14,fontWeight:600,padding:"13px 26px",borderRadius:999,display:"inline-block"}}/>
                    <E v={l.href} tag="span" path={['links',li,'href']} cn="ed-link-href"/>
                  </>
                ) : (
                  <a href={l.href} target="_blank" rel="noopener noreferrer">{l.label} ↗</a>
                )}
              </div>
            ))}
          </div>
          <div className="c-foot-meta mono">
            <E v={content.copyright} tag="span" path={['copyright']}/>
            <E v={content.locationMeta} tag="span" path={['locationMeta']}/>
            <span>v0.2 — studio sheet · live scroll</span>
          </div>
        </footer>

        {/* ── Edit mode: reset button ── */}
        {em && (
          <div style={{position:"fixed",bottom:16,left:16,zIndex:9998}}>
            <button onClick={reset} style={{appearance:"none",border:"1px solid rgba(255,100,100,.4)",borderRadius:8,background:"rgba(20,21,25,.88)",color:"rgba(255,100,100,.7)",padding:"7px 14px",font:"11px/1.4 'IBM Plex Mono',monospace",cursor:"pointer",backdropFilter:"blur(12px)"}}>
              ↺ Reset content
            </button>
          </div>
        )}
      </div>

      {/* ── Tweaks Panel ── */}
      <TweaksPanel>
        <TweakSection label="Theme"/>
        <TweakSelect label="Palette" value={tweaks.theme} options={["Cool Paper","Warm Sand","Sage","Ink (Dark)","Ember (Dark)"]} onChange={v=>setTweak("theme",v)}/>
        <TweakSelect label="Background" value={tweaks.texture} options={["Grid","Dots","Cursor","Plain"]} onChange={v=>setTweak("texture",v)}/>
        <TweakColor label="Accent" value={accentHex} options={C_ACCENTS} onChange={v=>setTweak("accent",v)}/>
        <TweakSection label="Projects"/>
        <TweakRadio label="Layout" value={tweaks.projectsLayout} options={["Grid","Spreads"]} onChange={v=>setTweak("projectsLayout",v)}/>
        <TweakToggle label="Alternate sides" value={tweaks.alternateSides} onChange={v=>setTweak("alternateSides",v)}/>
        <TweakRadio label="Image parallax" value={tweaks.parallax} options={["Off","Subtle","Strong"]} onChange={v=>setTweak("parallax",v)}/>
        <TweakSelect label="Heading hover" value={tweaks.headingFx} options={["None","Scramble","Highlight","Slide","Split"]} onChange={v=>setTweak("headingFx",v)}/>
      </TweaksPanel>
    </div>
    </EditCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DirectionCLive />);
</script>
</body>
</html>
