<!-- ─── Image Slot Web Component ──────────────────────────────────────────── -->
<script>
(() => {
  const STATE_KEY = '__image_slots__';
  const MAX_DIM = 1200;
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  const subs = new Set();
  let slots = {};
  try { slots = JSON.parse(sessionStorage.getItem(STATE_KEY) || '{}'); } catch {}

  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }
  function setSlot(id, val) {
    if (!id) return;
    if (val) slots[id] = val; else delete slots[id];
    try { sessionStorage.setItem(STATE_KEY, JSON.stringify(slots)); } catch {}
    subs.forEach((fn) => fn());
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally { bitmap.close && bitmap.close(); }
  }

  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.06)}' +
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;pointer-events:none;-webkit-user-drag:none;user-select:none;box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.35}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em;color:rgba(255,255,255,.5)}' +
    '.empty .sub{font-size:11px;color:rgba(255,255,255,.35)}' +
    '.empty .sub u{text-underline-offset:2px}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;background:rgba(201,100,66,.1)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(255,255,255,.2);transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;white-space:nowrap}' +
    ':host([data-filled]:hover) .ctl{opacity:1;pointer-events:auto}' +
    ':host([data-reframe]) .ctl{opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() { return ['shape','radius','mask','fit','position','placeholder','src','id']; }
    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace">Replace</button><button data-act="clear">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0; this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') { this._exitReframe(false); this._gen++; this._local = null; if (this.id) setSlot(this.id, null); else this._render(); }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      this._img.addEventListener('load', () => this._applyView());
      this.addEventListener('dblclick', (e) => {
        if (!this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true); else this._enterReframe();
      });
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault(); e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1, sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw, cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux + (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView(); this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView(); this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView(); this._applyView();
      }, { passive: false });
    }
    connectedCallback() {
      this.addEventListener('dragenter', this); this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this); this.addEventListener('drop', this);
      subs.add(this._subFn);
      this._ro = new ResizeObserver(() => this._render()); this._ro.observe(this);
      this._render();
    }
    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this); this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this); this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }
    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      this._outside = (e) => { if (e.composedPath && e.composedPath().includes(this)) return; this._exitReframe(true); };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }
    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe'); this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }
    attributeChangedCallback() { if (this.shadowRoot) this._render(); }
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        e.preventDefault(); e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault(); e.stopPropagation();
        this._depth = 0; this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }
    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) { this._setError('Drop a PNG, JPEG, WebP, or AVIF image.'); return; }
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) { if (gen !== this._gen) return; this._setError('Could not read that image.'); }
    }
    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div'); d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d); this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }
    _reframes() { return this.hasAttribute('data-filled') && (this.getAttribute('fit') || 'cover') === 'cover'; }
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }
    _clampView() {
      const g = this._geom(); if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }
    _applyView() {
      const g = this._geom(); const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        this._img.style.width = '100%'; this._img.style.height = '100%';
        this._img.style.left = '50%'; this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%'; return;
      }
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%', h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%', t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t; this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }
    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      if (this.id) setSlot(this.id, v); else { this._local = v; }
    }
    _render() {
      const mask = this.getAttribute('mask'); const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') { const n = parseFloat(this.getAttribute('radius')); radius = (Number.isFinite(n) ? n : 12) + 'px'; }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || ''; this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      if (url) {
        if (this._img.getAttribute('src') !== url) { this._img.src = url; this._ghost.src = url; }
        this._img.style.display = 'block'; this._empty.style.display = 'none';
        this.setAttribute('data-filled', ''); this._clampView(); this._applyView();
      } else {
        this._img.style.display = 'none'; this._img.removeAttribute('src'); this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex'; this.removeAttribute('data-filled');
      }
    }
  }
  if (!customElements.get('image-slot')) customElements.define('image-slot', ImageSlot);
})();
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };

  if (!open) return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <button onClick={() => setOpen(true)} style={{
        position: 'fixed', right: 16, bottom: 16, zIndex: 9999,
        appearance: 'none', border: 'none', borderRadius: '10px',

        boxShadow: '0 0 0 .5px rgba(255,255,255,.1),0 8px 24px rgba(0,0,0,.4)',
      }}>⚙ Tweaks</button>
    </>
  );

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════
// DOT FIELD (cursor-following interactive canvas background)
// ═══════════════════════════════════════════════════════════════════
function CDotField({ active, inkRgb, accentRgb, reduce }) {
  const canvasRef = React.useRef(null);
  const stateRef = React.useRef({ dots:[], mouse:{x:-9999,y:-9999}, raf:0, w:0, h:0 });

  React.useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const S = stateRef.current;
    const GAP = 34, R = 150;

    const build = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      S.w = window.innerWidth; S.h = window.innerHeight;
      canvas.width = S.w * dpr; canvas.height = S.h * dpr;
      canvas.style.width = S.w + "px"; canvas.style.height = S.h + "px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
      const cols = Math.ceil(S.w/GAP)+1, rows = Math.ceil(S.h/GAP)+1;
      const offx = (S.w-(cols-1)*GAP)/2, offy = (S.h-(rows-1)*GAP)/2;
      const dots = [];
      for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) {
        const bx=offx+c*GAP, by=offy+r*GAP;
        dots.push({bx,by,x:bx,y:by});
      }
      S.dots = dots;
    };

    const draw = () => {
      ctx.clearRect(0,0,S.w,S.h);
      const mx=S.mouse.x, my=S.mouse.y;
      for (const d of S.dots) {
        const dx=mx-d.bx, dy=my-d.by;
        const dist=Math.hypot(dx,dy);
        let tx=d.bx, ty=d.by, glow=0;
        if (!reduce && dist<R) {
          const f=1-dist/R; const pull=f*f*0.6;
          tx=d.bx+dx*pull; ty=d.by+dy*pull; glow=f;
        }
        d.x+=(tx-d.x)*0.15; d.y+=(ty-d.y)*0.15;
        const rad=1.3+glow*2.2;
        ctx.beginPath();
        ctx.fillStyle = glow>0.02
          ? "rgba("+accentRgb+","+(0.18+glow*0.55).toFixed(3)+")"
          : "rgba("+inkRgb+",0.16)";
        ctx.arc(d.x,d.y,rad,0,Math.PI*2); ctx.fill();
      }
      S.raf = requestAnimationFrame(draw);
    };

    const onMove=(e)=>{S.mouse.x=e.clientX;S.mouse.y=e.clientY;};
    const onLeave=()=>{S.mouse.x=-9999;S.mouse.y=-9999;};

    build(); draw();
    window.addEventListener("resize",build);
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseout",onLeave);
    return () => {
      cancelAnimationFrame(S.raf);
      window.removeEventListener("resize",build);
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseout",onLeave);
    };
  }, [active, inkRgb, accentRgb, reduce]);

  if (!active) return null;
  return <canvas ref={canvasRef} style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none" }} aria-hidden="true" />;
}

// ═══════════════════════════════════════════════════════════════════
// HEADING FX (scramble / highlight / slide / split)
// ═══════════════════════════════════════════════════════════════════
function FxHeading({ text, parts, fx, block }) {
  const segs = parts || [{ text }];
  const refs = React.useRef([]);
  const rafRef = React.useRef(0);
  React.useEffect(() => () => cancelAnimationFrame(rafRef.current), []);

  const runScramble = () => {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*<>/0123456789";
    const total = segs.reduce((n,s) => n+s.text.length, 0);
    const start = performance.now(), dur = Math.min(300+total*14, 900);
    const tick = (t) => {
      const p = Math.min((t-start)/dur, 1);
      const reveal = p*total;
      let base = 0;
      segs.forEach((s,si) => {
        let out = "";
        for (let i=0; i<s.text.length; i++) {
          const ch = s.text[i];
          if (ch===" "||ch==="&"||ch===","||ch===".") { out+=ch; continue; }
          out += (base+i)<reveal ? ch : chars[(Math.random()*chars.length)|0];
        }
        const el = refs.current[si]; if (el) el.textContent = out;
        base += s.text.length;
      });
      if (p<1) rafRef.current = requestAnimationFrame(tick);
      else segs.forEach((s,si) => { const el=refs.current[si]; if(el) el.textContent=s.text; });
    };
    cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(tick);
  };

  const isScramble = fx === "Scramble";
  const fxClass = isScramble ? "fx-scramble" : (fx && fx!=="None" ? "fx-"+fx.toLowerCase() : "");
  const cls = "fx-heading" + (block ? " fx-heading-block" : "") + (fxClass ? " "+fxClass : "");
  const inner = segs.map((s,si) => (
    <span key={si} ref={(el)=>(refs.current[si]=el)} className={s.hl ? "c-hl" : undefined}>{s.text}</span>
  ));
  return <span className={cls} onMouseEnter={isScramble ? runScramble : undefined}>{inner}</span>;
}

// PARALLAX IMAGE
// ═══════════════════════════════════════════════════════════════════
function ParallaxImage({ src, alt, amount }) {
  const wrapRef = React.useRef(null);
  const imgRef = React.useRef(null);

  React.useEffect(() => {
    const wrap = wrapRef.current, img = imgRef.current;
    if (!wrap || !img) return;
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce || !amount) { img.style.transform = "translate3d(0,0,0)"; return; }
    let ticking = false;
    const update = () => {
      ticking = false;
      const rect = wrap.getBoundingClientRect();
      const span = Math.abs(img.offsetHeight - rect.height);
      if (!span) { img.style.transform = "translate3d(0,0,0)"; return; }
      const vh = window.innerHeight || document.documentElement.clientHeight;
      const progress = (vh-rect.top)/(vh+rect.height);
      const clamped = Math.max(0,Math.min(1,progress));
      const maxShift = (span/2)*0.9;
      const shift = (clamped-0.5)*2*maxShift*amount;
      img.style.transform = "translate3d(0,"+shift.toFixed(1)+"px,0)";
    };
    const onScroll = () => { if(!ticking){window.requestAnimationFrame(update);ticking=true;} };
    window.addEventListener("scroll",onScroll,{passive:true});
    window.addEventListener("resize",update);
    if (!img.complete) img.addEventListener("load",update);
    update();
    return () => {
      window.removeEventListener("scroll",onScroll);
      window.removeEventListener("resize",update);
      img.removeEventListener("load",update);
    };
  }, [amount, src]);

  return (
    <div ref={wrapRef} style={{ position:"absolute", inset:0, overflow:"hidden", background:"#231431" }}>
      <div style={{ position:"absolute", inset:"-6%", backgroundImage:"url('"+src+"')", backgroundSize:"cover", backgroundPosition:"center", filter:"blur(28px) brightness(0.8) saturate(1.05)", transform:"scale(1.08)" }} />
      <img ref={imgRef} src={src} alt={alt} style={{ position:"absolute", left:0, top:"50%", translate:"0 -50%", width:"100%", height:"auto", display:"block", willChange:"transform", transform:"translate3d(0,0,0)", boxShadow:"0 24px 60px rgba(0,0,0,0.32)" }} />
    </div>
  );
}

// POEMS — STICKY HORIZONTAL SCROLL
// ═══════════════════════════════════════════════════════════════════
function CPoemsHorizontal() {
  const D = PORTFOLIO_DATA;
  const wrapRef = React.useRef(null);
  const trackRef = React.useRef(null);
  const fillRef = React.useRef(null);
  const countRef = React.useRef(null);
  const [wrapH, setWrapH] = React.useState("200vh");

  React.useEffect(() => {
    let dist = 0, raf = 0;
    const measure = () => {
      const track = trackRef.current; if (!track) return;
      dist = Math.max(track.scrollWidth - document.documentElement.clientWidth, 0);
      setWrapH(window.innerHeight + dist + "px");
      apply();
    };
    const apply = () => {
      const wrap = wrapRef.current, track = trackRef.current;
      if (!wrap||!track||dist<=0) return;
      const top = wrap.getBoundingClientRect().top + window.scrollY;
      const total = wrap.offsetHeight - window.innerHeight;
      const p = total>0 ? Math.min(Math.max((window.scrollY-top)/total,0),1) : 0;
      track.style.transform = `translate3d(${-p*dist}px,0,0)`;
      if (fillRef.current) fillRef.current.style.width = (p*100).toFixed(2)+"%";
      if (countRef.current) {
        const n=4, i=Math.min(n,Math.floor(p*n)+1);
        countRef.current.textContent = "0"+i+" / 0"+n;
      }
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf=requestAnimationFrame(apply); };
    measure();
    window.addEventListener("resize",measure);
    window.addEventListener("scroll",onScroll,{passive:true});
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize",measure); window.removeEventListener("scroll",onScroll); };
  }, []);

  return (
    <section id="poems" ref={wrapRef} style={{ position:"relative", marginTop:100, height:wrapH }}>
      <div style={{ position:"sticky", top:0, height:"100vh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", padding:"96px 80px 0", flex:"0 0 auto" }}>
          <span style={{ fontSize:15, fontWeight:600, letterSpacing:"0.02em" }}>Poems, occasionally</span>
          <span className="mono cobalt" style={{ fontSize:12 }}>scroll ↓ = →</span>
        </div>
        {/* Track */}
        <div style={{ flex:1, display:"flex", alignItems:"center", minHeight:0 }}>
          <div ref={trackRef} style={{ display:"flex", alignItems:"stretch", gap:32, padding:"0 80px", willChange:"transform" }}>
            {/* English poem */}
            <div className="c-hpoem" data-tag="EN — POEM">
              <h4 className="pt">{D.poems.en.title}</h4>
              <div className="pl">{D.poems.en.lines.join("\n")}</div>
              <div className="c-note mono">{D.poems.note}</div>
            </div>
            {/* Hebrew poem */}
            <div className="c-hpoem" data-tag="HE — שיר">
              <h4 className="pt rtl">{D.poems.he.title}</h4>
              <div className="pl rtl">{D.poems.he.lines.join("\n")}</div>
              <div className="c-note mono">{D.poems.note}</div>
            </div>
            {/* Slots */}
            <div className="c-hslot mono"><span className="n">[ poem 03 ]</span><span>open slot — drop a poem here</span></div>
            <div className="c-hslot mono"><span className="n">[ poem 04 ]</span><span>open slot — he or en</span></div>
            {/* End card */}
            <div style={{ flex:"0 0 auto", display:"flex", alignItems:"center", paddingRight:80 }}>
              <div style={{ fontSize:64, fontWeight:600, letterSpacing:"-0.03em", lineHeight:1.05, maxWidth:"9ch", color:"rgba(var(--ink-rgb),0.9)" }}>
                Back to <span className="cobalt">scrolling down</span>. ↓
              </div>
            </div>
          </div>
        </div>
        {/* Progress footer */}
        <div style={{ flex:"0 0 auto", padding:"0 80px 40px" }}>
          <div style={{ height:2, background:"rgba(var(--ink-rgb),0.15)", position:"relative" }}>
            <div ref={fillRef} style={{ position:"absolute", left:0, top:0, bottom:0, width:"0%", background:"var(--accent)", transition:"width 0.05s linear" }} />
          </div>
          <div className="mono" style={{ display:"flex", justifyContent:"space-between", marginTop:12, fontSize:11, color:"rgba(var(--ink-rgb),0.5)" }}>
            <span ref={countRef}>01 / 04</span>
            <span>(he + en)</span>
          </div>
        </div>
      </div>
    </section>
  );
}

            <h2>Psychology first, pixels second.</h2>
            <p>{D.bioLong}</p>
            <p className="mono cobalt" style={{ fontSize:13 }}>→ design is empathy with a grid system.</p>
          </div>
          <div className="right">
            <div className="c-fact"><span className="k mono">Education</span><span>B.Des Bezalel · M.A. Psychodrama</span></div>
            <div className="c-fact"><span className="k mono">Focus</span><span>Care, community, learning</span></div>
            <div className="c-fact"><span className="k mono">Tools</span><span>Figma · Claude Code · Base44</span></div>
            <div className="c-fact"><span className="k mono">Currently</span><span>Open to good problems</span></div>
          </div>
        </section>

        {/* ── Poems ── */}
        <CPoemsHorizontal />

        {/* ── Photos ── */}
        <div className="c-secthead" id="photos" style={{ marginTop:0 }}>
          <span className="t">Through the lens</span>
          <span className="n mono cobalt">(film + digital)</span>
        </div>
        <div className="c-strip">
          {D.photos.map((ph) => (
            <figure key={ph.id} className="c-shot" style={{ margin:0 }}>
              <image-slot
                id={"c-shot-"+ph.id}
                shape="rounded" radius="5" fit="cover"
                placeholder="Drop photo"
                style={{ display:"block", width:"100%", height:"180px" }}
              />
              <figcaption className="cap mono">{ph.caption}</figcaption>
            </figure>
          ))}
        </div>

        {/* ── Footer ── */}
        <footer className="c-footer" id="contact">
          <h2 className="big">
            Have a good problem?{" "}
            <span style={{ color:"var(--accent-bright)" }}>Let's talk.</span>
          </h2>
          <div className="c-links">
            {D.links.map((l) => (
              <a key={l.label} href={l.href} target="_blank" rel="noopener noreferrer">
                {l.label} ↗
              </a>
            ))}
          </div>
          <div className="c-foot-meta mono">
            <span>© 2026 Elad Adler</span>
            <span>Jerusalem, IL</span>
            <span>v0.2 — studio sheet · live scroll</span>
          </div>
        </footer>

      </div>

      {/* ── Tweaks Panel ── */}
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakSelect
          label="Palette" value={tweaks.theme}
          options={["Cool Paper","Warm Sand","Sage","Ink (Dark)","Ember (Dark)"]}
          onChange={(v) => setTweak("theme", v)}
        />
        <TweakSelect
          label="Background" value={tweaks.texture}
          options={["Grid","Dots","Cursor","Plain"]}
          onChange={(v) => setTweak("texture", v)}
        />
        <TweakColor
          label="Accent" value={accentHex}
          options={C_ACCENTS}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakSection label="Projects" />
        <TweakRadio
          label="Layout" value={tweaks.projectsLayout}
          options={["Grid","Spreads"]}
          onChange={(v) => setTweak("projectsLayout", v)}
        />
        <TweakToggle
          label="Alternate sides" value={tweaks.alternateSides}
          onChange={(v) => setTweak("alternateSides", v)}
        />
        <TweakRadio
          label="Image parallax" value={tweaks.parallax}
          options={["Off","Subtle","Strong"]}
          onChange={(v) => setTweak("parallax", v)}
        />
        <TweakSelect
          label="Heading hover" value={tweaks.headingFx}
          options={["None","Scramble","Highlight","Slide","Split"]}
          onChange={(v) => setTweak("headingFx", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DirectionCLive />);
</script>
</body>
</html>
